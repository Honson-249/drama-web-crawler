# Drama Web Crawler - Test Environment Docker Compose
# Usage: docker compose -f docker-compose.test.yml up -d

services:
  drama-crawler:
    image: ghcr.io/honson-249/drama-crawler:latest
    container_name: drama-crawler-test
    restart: unless-stopped
    env_file: .env
    ports:
      - "${DRAMA_SERVER_PORT:-9000}:9000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    # Resource limits for test environment
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
